emit:
  - "typespec-opencollection"
  - "@typespec/http-server-js"
linter:
  extends:
    - "typespec-opencollection/recommended"
options: 
  typespec-opencollection:
    emitter-output-dir: "{project-root}/collection"
  "@typespec/http-server-js":
    emitter-output-dir: "{project-root}/tsp-output"
    no-format: true