name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - name: Publish typespec-random-sample
        run: pnpm -C packages/typespec-random-sample publish --no-git-checks --provenance --access public

      - name: Publish typespec-opencollection
        run: pnpm -C packages/typespec-opencollection publish --no-git-checks --provenance --access public
